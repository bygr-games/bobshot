<html>
  <head>
    <meta charset="utf-8" />
    <title>base2D</title>
  </head>
  <body style="margin: 0; padding: 0; background-color: black" id="body">
    <canvas
      id="webgl"
      globalevents="0"
      style="width: 100%; height: 100%"
    ></canvas>
    <script>
      (function () {
        const blockedKeys = new Set([
          "F1",
          "F2",
          "F3",
          "F4",
          "F5",
          "F6",
          "F7",
          "F8",
          "F9",
          "F10",
          "F11",
          "F12",
          "Tab",
          "Escape",
        ]);

        const shouldBlock = function (event) {
          if (blockedKeys.has(event.key)) return true;
          if (event.ctrlKey || event.metaKey || event.altKey) return true;
          return false;
        };

        const stopShortcut = function (event) {
          if (!shouldBlock(event)) return;
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
        };

        window.addEventListener("keydown", stopShortcut, true);
        window.addEventListener("keyup", stopShortcut, true);
        window.addEventListener("keypress", stopShortcut, true);
        window.addEventListener(
          "contextmenu",
          function (event) {
            event.preventDefault();
          },
          true,
        );
      })();
    </script>
    <script type="text/javascript" src="bin/client.js"></script>
  </body>
</html>
